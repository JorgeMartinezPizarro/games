<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <!-- Mando NES centrado en el SVG cuadrado -->
  <g transform="translate(0,150)">
    <!-- Fondo del mando -->
    <rect x="0" y="0" width="600" height="300" rx="20" ry="20" fill="#2b2b2b" stroke="#999" stroke-width="5"/>

    <!-- Zona de color claro en el centro -->
    <rect x="50" y="50" width="500" height="200" rx="10" ry="10" fill="#d3d3d3"/>

    <!-- D-Pad -->
    <rect x="80" y="120" width="80" height="20" fill="black"/>
    <rect x="110" y="90" width="20" height="80" fill="black"/>

    <!-- Botones A y B -->
    <circle cx="450" cy="150" r="20" fill="red"/>
    <circle cx="500" cy="130" r="20" fill="red"/>

    <!-- Start y Select -->
    <rect x="260" y="160" width="30" height="10" fill="#444"/>
    <rect x="310" y="160" width="30" height="10" fill="#444"/>

    <!-- Letras A y B -->
    <text x="440" y="190" font-family="Arial" font-size="14" fill="#111">B</text>
    <text x="490" y="170" font-family="Arial" font-size="14" fill="#111">A</text>
  </g>
</svg>
