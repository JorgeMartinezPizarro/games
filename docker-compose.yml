services:
  games:
    image: jorgemartinezpizarro/games:latest
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    # Exposed locally to communicate with nginx
    ports:
      - 127.0.0.1:${PORT}:${PORT}
    environment:
      - PORT=${PORT}
      - DEV_PORT=${DEV_PORT}
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - NEXT_PUBLIC_ENABLE_LOGIN=${NEXT_PUBLIC_ENABLE_LOGIN}
      - NEXT_PUBLIC_CHESS_URL=http://stockfish:8080
      - NEXT_PUBLIC_WORD_URL=http://wordlist:5000
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - NEXT_PUBLIC_DEV_USER=${NEXT_PUBLIC_DEV_USER}
    volumes:
      - ./cache/audio/:/app/cache/audio
  mariadb:
    image: mariadb:11
    restart: always
    # Expuesto localmente para poder correr `games` sin dockerizar (npm run
    # dev/start) contra el mismo MariaDB que usa el stack dockerizado.
    ports:
      - 127.0.0.1:${MARIADB_PORT:-1010}:3306
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - ./cache/database:/var/lib/mysql
    healthcheck:
      # No basta con que el servidor responda a ping (mariadb-admin ping):
      # eso solo confirma que acepta conexiones, no que el schema/usuario que
      # usa la app ya son consultables. Se comprueba con las credenciales
      # reales de la app para que `depends_on: condition: service_healthy`
      # signifique "games ya puede conectar y hacer queries", no solo "el
      # puerto está abierto".
      test: ["CMD", "mariadb", "-u", "${MARIADB_USER}", "-p${MARIADB_PASSWORD}", "${MARIADB_DATABASE}", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
  wordlist:
    image: jorgemartinezpizarro/wordlist:latest
    # Exposed locally to comunicate with node
    ports:
      - 127.0.0.1:${WORDLIST_PORT:-1009}:5000
    volumes:
      - ./cache/audio/:/app/audio
  stockfish:
    image: jorgemartinezpizarro/stockfish:latest
    # Exposed locally to comunicate with node
    ports:
      - 127.0.0.1:${STOCKFISH_PORT:-1007}:8080
