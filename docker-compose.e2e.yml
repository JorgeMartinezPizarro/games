# Override de docker-compose.yml SOLO para las pruebas E2E (Playwright).
#
# Uso (lo hace playwright.config.ts automáticamente, no hace falta a mano):
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml \
#     --env-file .env.e2e -p games-e2e up --build -d
#
# Qué aísla de tu stack de desarrollo normal:
#  - build local del Dockerfile (no la imagen :latest publicada), para
#    probar siempre el código que tienes en el working tree.
#  - cache/e2e/* propio (audio + datos de MariaDB) para que las partidas de
#    test nunca se mezclen con tus datos reales de dev.
#  - puertos distintos: salen de .env.e2e (PORT/STOCKFISH_PORT/WORDLIST_PORT),
#    así puede convivir con un `docker compose up` de dev ya corriendo.
services:
  games:
    build:
      context: .
      dockerfile: Dockerfile
    image: games-e2e:local
    volumes:
      - ./cache/e2e/audio/:/app/cache/audio
  mariadb:
    # Volumen nombrado (no bind mount a cache/e2e/): en Docker Desktop para
    # Windows, un bind mount de host para /var/lib/mysql pasa por la capa de
    # traducción gRPC-FUSE/VirtioFS, y ahí MariaDB puede ver una base de datos
    # que acaba de crear como "no existente" para la primera conexión real
    # (visto como "Unknown database 'games'" justo tras el `up --build` del
    # webServer de Playwright, de forma reproducible). Un volumen nombrado
    # vive nativamente en el filesystem de la VM de Docker, sin esa capa, que
    # es justo lo que tanto Docker como MariaDB recomiendan para datos de BD.
    volumes:
      - mariadb-e2e-data:/var/lib/mysql
  wordlist:
    volumes:
      - ./cache/e2e/audio/:/app/audio

volumes:
  mariadb-e2e-data:
